name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # TEMPORARY: the 3 portraits of Juliana are still AI comps, and
      # check-assets.mjs fails the build while any remain. Deploying with them
      # anyway was a deliberate call — drop this env var the moment the real
      # photos land, so the gate goes back to doing its job.
      - run: ALLOW_PLACEHOLDERS=1 bun run build
      # SPA fallback: GitHub Pages serves 404.html for unknown paths,
      # BrowserRouter takes it from there.
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
